  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
    }
  }
  </script>
</head>
<body>
  <a class="dream-back-link" href="/">← IOM</a>
  <svg class="svg-filters" aria-hidden="true">
    <defs>
      <filter id="water-distort" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
        <feTurbulence
          id="water-turbulence"
          type="fractalNoise"
          baseFrequency="0.015 0.02"
          numOctaves="2"
          seed="1"
          result="noise" />
        <feDisplacementMap
          in="SourceGraphic"
          in2="noise"
          scale="5"
          xChannelSelector="R"
          yChannelSelector="G" />
      </filter>
    </defs>
  </svg>
  <script>
  (function() {
    var turbulence = document.getElementById('water-turbulence');
    if (!turbulence) return;
    var coarse = window.matchMedia('(pointer: coarse)').matches || window.matchMedia('(max-width: 640px)').matches;
    // Skip continuous SVG filter animation on phones — expensive compositing.
    if (coarse) return;
    var start = Date.now();
    var baseX = 0.015, baseY = 0.02, amp = 0.006;
    function tick() {
      var t = (Date.now() - start) / 1000;
      var fx = Math.max(0.008, Math.min(0.028, baseX + Math.sin(t * 0.5) * amp));
      var fy = Math.max(0.012, Math.min(0.032, baseY + Math.cos(t * 0.4) * amp));
      turbulence.setAttribute('baseFrequency', fx.toFixed(4) + ' ' + fy.toFixed(4));
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  })();
  </script>
  <div class="water-backdrop" aria-hidden="true"></div>
  <canvas id="waterCanvas" class="intro-ripples" aria-hidden="true"></canvas>
  <canvas id="waterCanvasOverlay" class="intro-ripples-overlay" aria-hidden="true"></canvas>
  <main class="dream">
    <section class="chapter chapter--intro" data-chapter="1" data-label="Still water">
      <div class="intro-surface" aria-hidden="true">
        <div class="intro-gradient"></div>
        <div class="intro-blob intro-blob--1"></div>
        <div class="intro-blob intro-blob--2"></div>
        <div class="intro-blob intro-blob--3"></div>
      </div>
      <div class="intro-black" aria-hidden="true"></div>
      <div class="intro-content">
        <a href="/" class="intro-logo-link" aria-label="IOM — home">
          <h1 class="intro-logo">Dream</h1>
        </a>
        <div class="intro-text-wrapper" aria-hidden="true">
          <p class="intro-text">Still water. Eyes closed. Calm.</p>
        </div>
        <button type="button" class="intro-play-btn" aria-label="Play"></button>
      </div>
      <video
        class="intro-video"
        loop
        playsinline
        muted
        preload="none"
        poster="images/01/final.jpg"
      >
        <source src="images/01/Final-1-ver2.mp4" type="video/mp4" />
      </video>
      <audio class="intro-audio" preload="metadata">
        <source src="audio-suno/Warm.mp3" type="audio/mpeg" />
      </audio>
      <div class="intro-controls" aria-label="Video controls" hidden>
        <button type="button" class="intro-control-btn intro-pause-btn" aria-label="Pause" data-state="playing">Pause</button>
        <button type="button" class="intro-control-btn intro-audio-btn" aria-label="Sound on" data-state="on">Sound on</button>
        <div class="intro-control-volume-wrap">
          <label for="intro-volume" class="intro-volume-label">Volume</label>
          <input type="range" id="intro-volume" class="intro-control-volume" min="0" max="100" value="100" aria-label="Volume" />
        </div>
        <button type="button" class="intro-control-btn intro-fullscreen-btn" aria-label="Fullscreen">Fullscreen</button>
      </div>
    </section>
  </main>
  <div id="debug-panel" class="debug-panel debug-panel--hidden" aria-live="polite"></div>
  <script type="module" src="js/water-gl.js?v=12"></script>
  <script src="js/main.js?v=5"></script>
  <script>
    // Load debug panel only when requested (?debug=1 or press D once).
    (function () {
      var want = /[?&]debug=1(?:&|$)/.test(location.search);
      function loadDebug() {
        if (window.__dreamDebugLoaded) return;
        window.__dreamDebugLoaded = true;
        var s = document.createElement('script');
        s.src = 'js/debug.js?v=1';
        document.body.appendChild(s);
      }
      if (want) loadDebug();
      window.addEventListener('keydown', function (e) {
        if (e.key === 'd' || e.key === 'D') loadDebug();
      });
    })();
  </script>
</body>
</html>
