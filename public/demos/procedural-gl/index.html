<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Procedural GL Terrain — IOM</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #08080c;
        font-family: system-ui, -apple-system, sans-serif;
      }
      /* Reserve a top strip for IOM chrome so the back link does not cover
         procedural.eu's search + rotation controls inside the iframe. */
      .demo-chrome {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: 44px;
        display: flex;
        align-items: center;
        padding: 0 12px;
        background: linear-gradient(
          180deg,
          rgba(8, 8, 12, 0.94) 0%,
          rgba(8, 8, 12, 0.72) 72%,
          rgba(8, 8, 12, 0) 100%
        );
        pointer-events: none;
      }
      #map-frame {
        position: fixed;
        top: 44px;
        left: 0;
        display: block;
        width: 100%;
        height: calc(100% - 44px);
        border: 0;
        background: #08080c;
      }
      .back-link {
        position: relative;
        z-index: 1;
        pointer-events: auto;
        color: rgba(255, 255, 255, 0.85);
        text-decoration: none;
        font-size: 13px;
        letter-spacing: 0.04em;
        padding: 6px 10px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 4px;
        background: rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(6px);
      }
      .back-link:hover {
        color: #fff;
        border-color: rgba(255, 255, 255, 0.45);
      }
      .hint {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        color: rgba(255, 255, 255, 0.55);
        font-size: 12px;
        letter-spacing: 0.03em;
        pointer-events: none;
        white-space: nowrap;
      }
      @media (max-width: 640px) {
        .hint {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <link rel="stylesheet" href="../attribution.css" />
    <header class="demo-chrome" aria-label="Demo navigation">
      <a class="back-link" href="/">← IOM</a>
    </header>
    <aside class="demo-attribution" aria-label="Attribution">
      <p class="demo-attribution-title">
        <a href="https://www.procedural.eu/" target="_blank" rel="noopener noreferrer"
          >procedural-gl.js</a
        >
        — 3D map terrain
      </p>
      <p class="demo-attribution-credits">
        Open-source WebGL library (MPL-2.0) by
        <a href="https://github.com/felixpalmer" target="_blank" rel="noopener noreferrer"
          >felixpalmer</a
        >. Live map hosted at
        <a href="https://www.procedural.eu/map/" target="_blank" rel="noopener noreferrer"
          >procedural.eu</a
        >. Terrain/imagery data via MapTiler &amp; OpenStreetMap contributors.
      </p>
      <a
        class="demo-attribution-source"
        href="https://github.com/felixpalmer/procedural-gl-js"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span class="demo-attribution-icon" aria-hidden="true">&lt;&gt;</span>
        View source code on GitHub
      </a>
    </aside>
    <iframe
      id="map-frame"
      title="Procedural GL JS — interactive 3D terrain map"
      src="https://www.procedural.eu/map/"
      allow="fullscreen"
      loading="eager"
      referrerpolicy="no-referrer-when-downgrade"
    ></iframe>
    <p class="hint">Drag to orbit · scroll to zoom · official procedural.eu map embed</p>
  </body>
</html>
