<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">IOM Studio production workspace</title>
  <desc id="desc">Dark local-first filmmaking workspace with story, shot, asset, and delivery tools.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10131a"/>
      <stop offset="1" stop-color="#080a0e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7c8cff" stop-opacity=".22"/>
      <stop offset="1" stop-color="#f59e5b" stop-opacity=".04"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity=".42"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="1270" cy="90" r="430" fill="#7c8cff" opacity=".035"/>
  <circle cx="1400" cy="780" r="360" fill="#f59e5b" opacity=".025"/>

  <g filter="url(#shadow)">
    <rect x="78" y="70" width="1444" height="860" rx="26" fill="#0d1015" stroke="#2b3039" stroke-width="2"/>
    <rect x="78" y="70" width="220" height="860" rx="26" fill="#11141a"/>
    <path d="M298 70v860" stroke="#292e37" stroke-width="2"/>

    <!-- Brand -->
    <g transform="translate(112 108)">
      <rect width="54" height="54" rx="11" fill="#f2f4f7"/>
      <circle cx="27" cy="27" r="19" fill="#14171c"/>
      <path d="M27 8a19 19 0 0 1 16.45 9.5L35.25 22A9.5 9.5 0 0 0 27 17.5z" fill="#f59e5b"/>
      <path d="m27 17.5 8.25 4.75v9.5L27 36.5l-8.25-4.75v-9.5z" fill="#f2f4f7"/>
    </g>
    <text x="181" y="133" fill="#f59e5b" font-family="Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="2">IOM</text>
    <text x="181" y="154" fill="#f2f4f7" font-family="Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="1.7">STUDIO</text>

    <!-- Navigation -->
    <g font-family="Arial, sans-serif" font-size="15">
      <rect x="96" y="210" width="184" height="48" rx="9" fill="#7c8cff" opacity=".14"/>
      <rect x="96" y="210" width="3" height="48" rx="2" fill="#7c8cff"/>
      <circle cx="121" cy="234" r="7" fill="#9ba7ff"/>
      <text x="144" y="240" fill="#f2f4f7" font-weight="700">Dashboard</text>
      <text x="112" y="302" fill="#9ba3af">Bible</text>
      <text x="112" y="356" fill="#9ba3af">Script</text>
      <text x="112" y="410" fill="#9ba3af">Shots</text>
      <text x="112" y="464" fill="#9ba3af">Production assets</text>
      <text x="112" y="518" fill="#9ba3af">Deliver</text>
    </g>

    <text x="112" y="866" fill="#6f7784" font-family="Arial, sans-serif" font-size="12" letter-spacing="1.4">LOCAL WORKSPACE</text>
    <circle cx="116" cy="892" r="5" fill="#45c7a0"/>
    <text x="132" y="897" fill="#9ba3af" font-family="Arial, sans-serif" font-size="13">Private / autosaved</text>

    <!-- Top bar -->
    <path d="M298 144h1224" stroke="#292e37" stroke-width="2"/>
    <text x="338" y="116" fill="#f2f4f7" font-family="Arial, sans-serif" font-size="16" font-weight="700">The Black Witness</text>
    <text x="494" y="116" fill="#555d69" font-family="Arial, sans-serif" font-size="15">/</text>
    <text x="512" y="116" fill="#8b94a3" font-family="Arial, sans-serif" font-size="15">Dashboard</text>
    <rect x="1262" y="91" width="148" height="33" rx="7" fill="#f59e5b" opacity=".09" stroke="#f59e5b" stroke-opacity=".4"/>
    <text x="1282" y="113" fill="#ffc28f" font-family="Arial, sans-serif" font-size="13" font-weight="700">SAVE .IOMSTUDIO</text>
    <circle cx="1444" cy="107" r="5" fill="#45c7a0"/>
    <text x="1457" y="112" fill="#83dfc2" font-family="Arial, sans-serif" font-size="12">Saved</text>

    <!-- Main heading -->
    <text x="350" y="216" fill="#7c8cff" font-family="Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2">LOCAL CREATIVE PRODUCTION</text>
    <text x="350" y="270" fill="#f2f4f7" font-family="Arial, sans-serif" font-size="42" font-weight="700">Direct the story. Build the world.</text>
    <text x="350" y="304" fill="#8f98a6" font-family="Arial, sans-serif" font-size="17">One private workspace for characters, scripts, shots, AI, 3D, and delivery.</text>

    <!-- Metrics -->
    <g font-family="Arial, sans-serif">
      <g transform="translate(350 350)">
        <rect width="248" height="116" rx="13" fill="#151920" stroke="#2b3039"/>
        <text x="22" y="39" fill="#89929f" font-size="13">CHARACTERS</text>
        <text x="22" y="82" fill="#f2f4f7" font-size="34" font-weight="700">12</text>
        <circle cx="211" cy="58" r="20" fill="#7c8cff" opacity=".12"/>
        <circle cx="211" cy="58" r="7" fill="#9ba7ff"/>
      </g>
      <g transform="translate(616 350)">
        <rect width="248" height="116" rx="13" fill="#151920" stroke="#2b3039"/>
        <text x="22" y="39" fill="#89929f" font-size="13">STORY BEATS</text>
        <text x="22" y="82" fill="#f2f4f7" font-size="34" font-weight="700">38</text>
        <path d="M198 67h28M198 57h28M198 47h18" stroke="#9ba7ff" stroke-width="4" stroke-linecap="round"/>
      </g>
      <g transform="translate(882 350)">
        <rect width="248" height="116" rx="13" fill="#151920" stroke="#2b3039"/>
        <text x="22" y="39" fill="#89929f" font-size="13">SHOTS</text>
        <text x="22" y="82" fill="#f2f4f7" font-size="34" font-weight="700">64</text>
        <rect x="194" y="42" width="34" height="26" rx="4" fill="none" stroke="#f59e5b" stroke-width="3"/>
      </g>
      <g transform="translate(1148 350)">
        <rect width="300" height="116" rx="13" fill="#151920" stroke="#2b3039"/>
        <text x="22" y="39" fill="#89929f" font-size="13">PRODUCTION ROUTES</text>
        <text x="22" y="78" fill="#83dfc2" font-size="15" font-weight="700">3D 18</text>
        <text x="91" y="78" fill="#ffc28f" font-size="15" font-weight="700">AI 31</text>
        <text x="148" y="78" fill="#c9b7ff" font-size="15" font-weight="700">HYBRID 15</text>
      </g>
    </g>

    <!-- Pipeline -->
    <rect x="350" y="500" width="1098" height="330" rx="15" fill="url(#glow)" stroke="#2b3039"/>
    <text x="376" y="540" fill="#f2f4f7" font-family="Arial, sans-serif" font-size="18" font-weight="700">Shot 024 / Rooftop encounter</text>
    <text x="376" y="568" fill="#8f98a6" font-family="Arial, sans-serif" font-size="14">Ordered production stages</text>

    <g transform="translate(376 606)" font-family="Arial, sans-serif">
      <rect width="242" height="150" rx="12" fill="#12161c" stroke="#7c8cff" stroke-opacity=".42"/>
      <rect x="20" y="20" width="38" height="25" rx="5" fill="#7c8cff" opacity=".18"/>
      <text x="72" y="38" fill="#9ba7ff" font-size="12" font-weight="700" letter-spacing="1">01 / BLOCK</text>
      <text x="20" y="78" fill="#f2f4f7" font-size="18" font-weight="700">Scene layout</text>
      <text x="20" y="108" fill="#89929f" font-size="13">Blender / camera + set</text>
      <rect x="20" y="124" width="83" height="8" rx="4" fill="#45c7a0" opacity=".7"/>

      <path d="M258 75h42" stroke="#424956" stroke-width="2"/>
      <path d="m291 68 9 7-9 7" fill="none" stroke="#424956" stroke-width="2"/>

      <g transform="translate(316)">
        <rect width="242" height="150" rx="12" fill="#12161c" stroke="#f59e5b" stroke-opacity=".42"/>
        <rect x="20" y="20" width="38" height="25" rx="5" fill="#f59e5b" opacity=".17"/>
        <text x="72" y="38" fill="#ffc28f" font-size="12" font-weight="700" letter-spacing="1">02 / GENERATE</text>
        <text x="20" y="78" fill="#f2f4f7" font-size="18" font-weight="700">Concept frame</text>
        <text x="20" y="108" fill="#89929f" font-size="13">ComfyUI / locked prompt</text>
        <rect x="20" y="124" width="118" height="8" rx="4" fill="#f59e5b" opacity=".72"/>
      </g>

      <path d="M574 75h42" stroke="#424956" stroke-width="2"/>
      <path d="m607 68 9 7-9 7" fill="none" stroke="#424956" stroke-width="2"/>

      <g transform="translate(632)">
        <rect width="242" height="150" rx="12" fill="#12161c" stroke="#a78bfa" stroke-opacity=".42"/>
        <rect x="20" y="20" width="38" height="25" rx="5" fill="#a78bfa" opacity=".17"/>
        <text x="72" y="38" fill="#c9b7ff" font-size="12" font-weight="700" letter-spacing="1">03 / COMPOSITE</text>
        <text x="20" y="78" fill="#f2f4f7" font-size="18" font-weight="700">Final shot</text>
        <text x="20" y="108" fill="#89929f" font-size="13">Hybrid / image + 3D</text>
        <rect x="20" y="124" width="156" height="8" rx="4" fill="#a78bfa" opacity=".72"/>
      </g>
    </g>

    <rect x="1257" y="786" width="163" height="4" rx="2" fill="#343b46"/>
    <rect x="1257" y="786" width="114" height="4" rx="2" fill="#7c8cff"/>
  </g>

  <text x="800" y="972" text-anchor="middle" fill="#68717f" font-family="Arial, sans-serif" font-size="14" letter-spacing="3">IOM STUDIO / STORY / SHOT / ASSET / DELIVERY</text>
</svg>
